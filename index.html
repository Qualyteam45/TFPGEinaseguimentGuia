<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eina de Seguiment de la Guia - Postgrau Govern Obert</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .tab-active { background: #0f172a !important; color: white !important; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .status-select { transition: all 0.2s; border-radius: 10px; font-weight: 800; font-size: 10px; text-transform: uppercase; border: none; cursor: pointer; appearance: none; text-align: center; }
    .status-Pendent { background-color: #f1f5f9; color: #64748b; }
    .status-Execució { background-color: #e0e7ff; color: #4338ca; }
    .status-Finalitzat { background-color: #dcfce7; color: #15803d; }
    .status-Aturat { background-color: #fee2e2; color: #b91c1c; }
    .status-Noaplica { background-color: #f8fafc; color: #94a3b8; border: 1px solid #e2e8f0; }
    .plus-badge { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
    .info-card { display: none; animation: slideDown 0.3s ease-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-pulse-red { animation: pulseRed 1.5s infinite; }
    @keyframes pulseRed { 0%, 100% { background-color: #ef4444; } 50% { background-color: #991b1b; } }
    .redflag-card { border-left: 6px solid #ef4444; background-color: #fef2f2; animation: shake 0.5s ease-in-out; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body class="pb-12">

  <div class="max-w-7xl mx-auto p-4 md:p-8">
    
    <header class="bg-white rounded-[2.5rem] shadow-xl p-10 mb-8 border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-8 no-print">
      <div class="flex-1">
        <div class="inline-flex items-center gap-2 rounded-full bg-indigo-50 px-5 py-2 text-[10px] font-black tracking-widest uppercase text-indigo-600 mb-4 border border-indigo-100">
          Postgrau de Govern Obert i Transformació Digital
        </div>
        <h1 class="text-5xl font-extrabold tracking-tighter text-slate-900 mb-2">Eina de Seguiment</h1>
        <p class="text-slate-400 font-medium italic">Gestió de Qualitat de Cartes de Serveis • 2026</p>
      </div>
      
      <div class="bg-slate-50 p-8 rounded-[2rem] border border-slate-100 w-full md:w-auto min-w-[420px]">
        <div class="flex justify-between items-center mb-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block ml-1">Carta Activa</label>
            <div id="globalAlert" class="hidden animate-pulse-red px-2 py-1 rounded-lg text-[9px] font-black text-white uppercase italic shadow-lg">Retard Crític</div>
        </div>
        <div class="flex gap-2 mb-4">
          <select id="projectSelector" class="flex-1 h-12 rounded-2xl border-none bg-white px-4 font-bold text-indigo-600 shadow-sm outline-none ring-indigo-500 transition-all"></select>
          <button onclick="renameCurrentProject()" class="bg-white text-slate-400 hover:text-indigo-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm transition-all" title="Canviar nom">✏️</button>
          <button onclick="deleteCurrentProject()" class="bg-white text-slate-400 hover:text-red-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm transition-all" title="Eliminar carta">🗑️</button>
        </div>
        <div class="flex gap-2">
          <input id="newProjectInput" class="flex-1 h-12 px-5 rounded-2xl border-none bg-white shadow-sm outline-none text-sm" placeholder="Nom nova carta..." />
          <button id="createProjectBtn" class="bg-indigo-600 text-white px-6 h-12 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg transition-all">Crear</button>
        </div>
      </div>
    </header>

    <nav class="bg-white/70 backdrop-blur-xl rounded-[2rem] shadow-lg p-3 border border-slate-100 mb-8 sticky top-4 z-50 no-print">
      <div class="grid grid-cols-2 md:grid-cols-5 gap-3 text-center">
        <button class="tab-btn rounded-2xl py-4 font-bold text-slate-400 hover:bg-white transition-all flex flex-col items-center gap-1" data-tab="guia">📖<span class="text-[10px] uppercase font-black">Introducció</span></button>
        <button class="tab-btn rounded-2xl py-4 font-bold text-slate-400 hover:bg-white transition-all flex flex-col items-center gap-1" data-tab="seguiment">📊<span class="text-[10px] uppercase font-black">Seguiment PDCA</span></button>
        <button class="tab-btn rounded-2xl py-4 font-bold text-slate-400 hover:bg-white transition-all flex flex-col items-center gap-1" data-tab="roadmap">🗺️<span class="text-[10px] uppercase font-black">Roadmap</span></button>
        <button class="tab-btn rounded-2xl py-4 font-bold text-slate-400 hover:bg-white transition-all flex flex-col items-center gap-1" data-tab="gantt">⏳<span class="text-[10px] uppercase font-black">Cronograma</span></button>
        <button class="tab-btn rounded-2xl py-4 font-bold text-slate-400 hover:bg-white transition-all flex flex-col items-center gap-1" data-tab="dashboard">🏆<span class="text-[10px] uppercase font-black">Dashboard</span></button>
      </div>
    </nav>

    <div id="criticalBanner" class="hidden mb-6 bg-red-600 text-white p-4 rounded-2xl text-center font-black uppercase tracking-[0.2em] text-xs shadow-lg animate-pulse-red no-print">
        ⚠️ Atenció: Hi ha fites obligatòries fora de termini! ⚠️
    </div>

    <main id="tabContent"></main>
  </div>

  <script>
    const STATUS = { PENDENT: 'Pendent', EXECUCIO: 'En Execució', FET: 'Finalitzat', ATURAT: 'Aturat', NO_APLICA: 'No aplica' };
    const STRUCTURE = [
      { id: 'P', title: 'Fase 1 (Planificar) Planificació i elaboració', color: 'bg-sky-600', 
        progressMsg: "Molt bé! Ara que tens la carta elaborada, és el moment d'aprovar-la i publicar-la!",
        sections: [
          { subtitle: '1. PLANIFICACIÓ', tasks: [
            { id: 't1', title: 'Designar el coordinador/a del projecte', desc: "L’Alcaldia designarà el coordinador formalment.", tip: "TAG o Secretari/ària." },
            { id: 't2', title: 'Definir l’abast del projecte', desc: "Concretar serveis, col·lectius i canals.", tip: "Acota bé el servei." },
            { id: 't3', title: 'Plus: Formar equip de treball transversal', plus: true, desc: "Equip de 4 a 8 persones.", tip: "Diferents visions." },
            { id: 't4', title: 'Plus: Elaborar pla de treball i diagrama de Gantt', plus: true, desc: "Document marc amb objectius i terminis.", tip: "Fites clares." }
          ]},
          { subtitle: '2. ELABORACIÓ', tasks: [
            { id: 't5', title: 'Organització i descripció del servei', desc: "Missió i condicions d'accés.", tip: "Evita tecnicismes." },
            { id: 't6', title: 'Recollida d’informació situació actual', desc: "Anàlisi de dades reals.", tip: "Usa Excel." },
            { id: 't7', title: 'Plus: Realitzar enquesta de satisfacció recent', plus: true, desc: "Detectar què valoren els usuaris.", tip: "5 o 6 preguntes." },
            { id: 't8', title: 'Definició de compromisos i indicadors', desc: "Promeses mesurables.", tip: "Sense mesura no hi ha compromís.", resource: "Eina redacció indicadors", link: "https://einacompromisosindicadors.netlify.app/" },
            { id: 't9', title: 'Drets, deures i vies CQS', desc: "Canals de queixa.", tip: "Millora contínua." },
            { id: 't10', title: 'Redacció de la proposta de carta', desc: "Plantilla oficial.", tip: "Revisa coherència.", resource: "Eina de redacció cartes", link: "https://einaredacciocartesserveis.netlify.app/" }
          ]}
        ]
      },
      { id: 'D', title: 'Fase 2 (Desenvolupar) Validació, aprovació i publicació', color: 'bg-violet-600', progressMsg: "Enhorabona! La carta ja està publicada oficialment!",
        sections: [
          { subtitle: '1. VALIDACIÓ', tasks: [{ id: 't11', title: 'Validació tècnica i jurídica' }, { id: 't12', title: 'Aprovació oficial (Decret o Ple)' }]},
          { subtitle: '2. PUBLICACIÓ', tasks: [{ id: 't14', title: 'Publicació a la Seu i Portal Transparència' }]}
        ]
      },
      { id: 'C', title: 'Fase 3 (Comprovar) Seguiment i avaluació', color: 'bg-emerald-600', progressMsg: "Enhorabona! Ja has avaluat la carta, ara cal millorar!",
        sections: [{ subtitle: '1. AVALUACIÓ', tasks: [{ id: 't16', title: 'Revisió indicadors i queixes' }, { id: 't17', title: 'Informe d’avaluació anual' }]}]
      },
      { id: 'A', title: 'Fase 4 (Actuar) Millora i actualització', color: 'bg-amber-600', progressMsg: "Cicle completat! La carta segueix viva.",
        sections: [{ subtitle: '1. MILLORA', tasks: [{ id: 't18', title: 'Incorporació de millores' }, { id: 't19', title: 'Actualització de la Carta' }]}]
      }
    ];

    const STORAGE_IDX = 'guia_f_VFINAL_PREMI_idx';
    const STORAGE_DATA = 'guia_f_VFINAL_PREMI_data_';
    const STORAGE_ACT = 'guia_f_VFINAL_PREMI_act';

    let state = { projects: [], activeProjectId: '', activeTab: 'guia' };

    function init() {
      state.projects = JSON.parse(localStorage.getItem(STORAGE_IDX) || '[]');
      if (!state.projects.length) {
        const p = createProjectData('Projecte: Carta OAC');
        state.projects = [{ id: p.id, name: p.name }];
        localStorage.setItem(STORAGE_DATA + p.id, JSON.stringify(p));
        localStorage.setItem(STORAGE_IDX, JSON.stringify(state.projects));
      }
      state.activeProjectId = localStorage.getItem(STORAGE_ACT) || state.projects[0].id;
      bindEvents(); render();
    }

    function createProjectData(name) {
      const tasks = [];
      STRUCTURE.forEach(f => f.sections.forEach(s => s.tasks.forEach(t => {
        tasks.push({ id: t.id, phaseId: f.id, phaseTitle: f.title, title: t.title, plus: t.plus||false, tip: t.tip||"", desc: t.desc||"", resource: t.resource||null, link: t.link||null, status: STATUS.PENDENT, owner: '', startDate: '', endDate: '' });
      })));
      return { id: Date.now().toString(), name, tasks, gestio: 'directa' };
    }

    function getActiveProjectData() { return JSON.parse(localStorage.getItem(STORAGE_DATA + state.activeProjectId)); }
    function saveActiveProjectData(data) { localStorage.setItem(STORAGE_DATA + state.activeProjectId, JSON.stringify(data)); }

    function bindEvents() {
      document.getElementById('createProjectBtn').onclick = () => {
        const i = document.getElementById('newProjectInput'); if(!i.value) return;
        const p = createProjectData(i.value);
        state.projects.push({ id: p.id, name: p.name });
        localStorage.setItem(STORAGE_IDX, JSON.stringify(state.projects));
        localStorage.setItem(STORAGE_DATA + p.id, JSON.stringify(p));
        state.activeProjectId = p.id; localStorage.setItem(STORAGE_ACT, p.id);
        i.value = ''; render();
      };
      document.getElementById('projectSelector').onchange = (e) => { state.activeProjectId = e.target.value; localStorage.setItem(STORAGE_ACT, state.activeProjectId); render(); };
      document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => { state.activeTab = b.dataset.tab; render(); });
    }

    function renameCurrentProject() {
      const p = state.projects.find(x => x.id === state.activeProjectId);
      const n = prompt("Canvia el nom:", p.name);
      if(n) { p.name = n; localStorage.setItem(STORAGE_IDX, JSON.stringify(state.projects)); const d = getActiveProjectData(); d.name = n; saveActiveProjectData(d); render(); }
    }

    function deleteCurrentProject() {
        if(confirm("Eliminar carta?")) {
            localStorage.removeItem(STORAGE_DATA + state.activeProjectId);
            state.projects = state.projects.filter(x => x.id !== state.activeProjectId);
            localStorage.setItem(STORAGE_IDX, JSON.stringify(state.projects));
            if(!state.projects.length) { localStorage.clear(); init(); } else { state.activeProjectId = state.projects[0].id; render(); }
        }
    }

    function updateTask(tid, field, val) { const p = getActiveProjectData(); p.tasks = p.tasks.map(t => t.id === tid ? {...t, [field]: val} : t); saveActiveProjectData(p); render(); }
    function updateGestio(v) { const p = getActiveProjectData(); p.gestio = v; saveActiveProjectData(p); render(); }
    window.toggleInfo = (id) => { const el = document.getElementById('info-' + id); if(el) el.style.display = (el.style.display === 'block') ? 'none' : 'block'; };
    function formatDate(d) { if(!d) return "-"; const parts = d.split('-'); return `${parts[2]}/${parts[1]}/${parts[0].slice(-2)}`; }

    function render() {
      const project = getActiveProjectData(); if(!project) return;
      const today = new Date(); today.setHours(0,0,0,0);
      const lateTasks = project.tasks.filter(t => t.endDate && t.status !== STATUS.FET && t.status !== STATUS.NO_APLICA && today > new Date(t.endDate));
      document.getElementById('globalAlert').classList.toggle('hidden', lateTasks.length === 0);
      document.getElementById('criticalBanner').classList.toggle('hidden', lateTasks.length === 0 || state.activeTab === 'guia');
      document.getElementById('projectSelector').innerHTML = state.projects.map(p => `<option value="${p.id}" ${p.id === state.activeProjectId ? 'selected' : ''}>${p.name}</option>`).join('');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('tab-active', b.dataset.tab === state.activeTab));

      const main = document.getElementById('tabContent');

      if (state.activeTab === 'guia') {
        main.innerHTML = `
          <div class="max-w-6xl mx-auto space-y-8">
            <div class="bg-white rounded-[3rem] shadow-xl p-12 border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="flex-1">
                    <h2 class="text-3xl font-black text-indigo-950 mb-4 uppercase italic tracking-tighter">Presentació i objectiu</h2>
                    <p class="text-sm text-slate-600 leading-relaxed mb-6">Aquesta guia pràctica t’acompanyarà en tot el procés per conèixer, elaborar, aprovar i avaluar una carta de serveis municipal. L’objectiu és explicar-te la metodologia que has de seguir per disposar d’una eina viva de gestió de la qualitat. Per fer-ho fàcil, s’estructura en etapes lògiques.</p>
                    <h3 class="font-black text-indigo-900 uppercase text-xs tracking-widest mb-4 italic">Estructura de la guia (PDCA)</h3>
                    <div class="space-y-3 text-xs text-indigo-800 border-l-4 border-indigo-100 pl-4">
                        <p><b>Fase 1 (Planificar):</b> Treball intern on construïm els fonaments de la carta.</p>
                        <p><b>Fase 2 (Desenvolupar):</b> Moment de donar caràcter oficial i públic a la carta.</p>
                        <p><b>Fase 3 (Comprovar):</b> Mesurar si complim amb el que hem promès i elaborar l'informe anual.</p>
                        <p><b>Fase 4 (Actuar):</b> Aplicar accions de millora segons l'avaluació, tancant el cicle.</p>
                    </div>
                </div>
                <div class="shrink-0">
                    <a href="https://youtu.be/BGp81FsgtUE" target="_blank" class="bg-indigo-600 text-white px-10 py-6 rounded-3xl font-black shadow-xl hover:bg-indigo-700 transition-all flex items-center gap-3 shrink-0 uppercase tracking-widest text-sm">
                        <span>🎬</span> VEURE VÍDEO INTRODUCTORI
                    </a>
                </div>
            </div>
            <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100">
                <h3 class="font-black text-slate-900 uppercase text-xs tracking-widest mb-6 border-b pb-4">Com entendre la guia</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="p-4 bg-slate-50 rounded-2xl text-[10px] leading-relaxed flex gap-3 italic"><span>💡</span><b>Bona pràctica:</b> consells i recomanacions basades en l'experiència.</div>
                    <div class="p-4 plus-badge rounded-2xl text-[10px] leading-relaxed flex gap-3 italic font-bold"><span>✨</span><b>Plus de qualitat:</b> propostes per anar un pas més enllà.</div>
                    <div class="p-4 bg-slate-900 text-white rounded-2xl text-[10px] leading-relaxed flex gap-3 italic"><span>🛠️</span><b>Recurs:</b> eines disponibles per facilitar-te la tasca.</div>
                    <div class="p-4 bg-indigo-100 text-indigo-900 rounded-2xl text-[10px] leading-relaxed flex gap-3 italic font-black"><span>🚀</span><b>Progrés:</b> estat del procés en cada fase.</div>
                </div>
            </div>
          </div>`;
      } else if (state.activeTab === 'seguiment') {
        const isInd = project.gestio === 'indirecta';
        main.innerHTML = `<div class="bg-indigo-900 text-white p-6 rounded-[2rem] mb-12 flex justify-between items-center shadow-xl">
            <div><p class="text-lg font-bold">Configuració del Servei</p><p class="text-indigo-200 text-xs italic uppercase">Gestió Directa o Indirecta</p></div>
            <div class="flex bg-indigo-800 p-1.5 rounded-2xl gap-2">
                <button onclick="updateGestio('directa')" class="px-6 py-3 rounded-xl font-bold text-xs ${!isInd?'bg-white text-indigo-900 shadow-lg':'text-indigo-300'} uppercase transition-all">Directa</button>
                <button onclick="updateGestio('indirecta')" class="px-6 py-3 rounded-xl font-bold text-xs ${isInd?'bg-white text-indigo-900 shadow-lg':'text-indigo-300'} uppercase transition-all">Indirecta</button>
            </div>
        </div>` + STRUCTURE.map(f => {
          const tks = project.tasks.filter(t => t.phaseId === f.id);
          const obligatory = tks.filter(t => !t.plus && t.status !== STATUS.NO_APLICA);
          const allDone = obligatory.length > 0 && obligatory.every(t => t.status === STATUS.FET);
          return `<div class="bg-white rounded-[2.5rem] shadow-xl mb-12 overflow-hidden border border-slate-100">
            <div class="${f.color} p-6 text-white flex justify-between items-center"><h2 class="text-xs font-black uppercase tracking-widest">${f.title}</h2></div>
            <div class="overflow-x-auto"><table class="w-full text-xs">
              <thead class="bg-slate-50 border-b"><tr class="text-[9px] uppercase text-slate-400 font-bold"><th class="p-4 text-left">Fita</th><th class="p-4 text-left">Estat</th><th class="p-4 text-left">Responsable/Comentari</th><th class="p-4 text-left w-28">Inici</th><th class="p-4 text-left w-28">Final</th></tr></thead>
              <tbody>${tks.map(t => {
                const limit = t.endDate ? new Date(t.endDate) : null;
                const isL = t.status !== STATUS.FET && t.status !== STATUS.NO_APLICA && limit && today > limit;
                let rf = (isInd && (t.id==='t5'||t.id==='t8'||t.id==='t10')) ? `<div class="mt-2 p-3 redflag-card rounded-xl text-[9px] font-bold text-red-800 italic">🚩 RED FLAG: En el cas de serveis de gestió indirecta, cal tenir present els plecs de contractació o la normativa específica</div>` : "";
                const infoIcon = (f.id === 'P') ? `<button onclick="window.toggleInfo('${t.id}')" class="ml-2 text-indigo-300">ⓘ</button>` : '';
                return `<tr class="border-b hover:bg-slate-50/50 transition-all"><td class="p-6 w-1/3"><b>${t.title}</b>${infoIcon}
                <div id="info-${t.id}" class="info-card text-[10px] text-slate-500 mt-2 p-3 bg-slate-50 rounded-xl leading-relaxed">${t.desc||"Detall de la fita."}</div>
                <div class="flex gap-2 mt-2">
                  ${t.plus?'<span class="plus-badge px-2 py-0.5 rounded text-[8px] uppercase font-black italic">Plus ✨</span>':''}
                  ${t.resource ? `<a href="${t.link}" target="_blank" class="bg-indigo-600 text-white px-2 py-0.5 rounded text-[8px] uppercase font-black tracking-widest hover:bg-indigo-800 transition-colors">🛠️ ${t.resource}</a>` : ''}
                </div>${rf}</td>
                <td class="p-4"><select onchange="updateTask('${t.id}','status',this.value)" class="status-select p-3 w-32 status-${t.status.replace(' ','')}">${Object.values(STATUS).map(s=>`<option value="${s}" ${s===t.status?'selected':''}>${s}</option>`).join('')}</select></td>
                <td class="p-4"><input value="${t.owner||''}" onchange="updateTask('${t.id}','owner',this.value)" placeholder="👤 Nom o comentari" class="bg-transparent border-b w-full outline-none text-[10px]"></td>
                <td class="p-4"><input type="date" value="${t.startDate||''}" onchange="updateTask('${t.id}','startDate',this.value)" class="bg-transparent outline-none text-[10px]"></td>
                <td class="p-4"><span class="${isL?'text-red-600 font-black animate-pulse':''}"><input type="date" value="${t.endDate||''}" onchange="updateTask('${t.id}','endDate',this.value)" class="bg-transparent outline-none text-[10px]"></span></td></tr>`;
              }).join('')}</tbody></table></div>
            ${allDone?`<div class="bg-slate-900 p-8 text-white flex items-center gap-6 border-t border-slate-800 animate-slideDown"><div class="text-4xl">🚀</div><div><p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Missatge de Progrés Assolit</p><p class="text-lg italic font-bold leading-relaxed underline decoration-indigo-500 underline-offset-4">${f.progressMsg}</p></div></div>`:''}
          </div>`;
        }).join('');
      } else if (state.activeTab === 'roadmap') {
        main.innerHTML = `<div class="bg-white p-16 rounded-[3rem] shadow-xl border border-slate-100"><h2 class="text-3xl font-black mb-12 uppercase text-slate-900 tracking-tighter">Roadmap</h2><div class="grid grid-cols-4 gap-8">
            ${STRUCTURE.map(f => `<div><div class="w-10 h-10 ${f.color} rounded-xl mb-4 text-white flex items-center justify-center font-black shadow-lg">${f.id}</div><ul class="border-l pl-4 space-y-3">
                ${project.tasks.filter(t => t.phaseId === f.id).map(t => `<li class="text-[10px] ${t.status === STATUS.FET ? 'text-emerald-600 font-bold' : 'text-slate-400'}">● ${t.title}</li>`).join('')}
            </ul></div>`).join('')}</div></div>`;
      } else if (state.activeTab === 'gantt') {
        main.innerHTML = `<div class="bg-white p-12 rounded-[2.5rem] shadow-xl border border-slate-100"><h2 class="text-3xl font-black mb-12 uppercase text-slate-800">Cronograma</h2>
            ${STRUCTURE.map(f => `<div class="mb-10"><p class="text-[10px] font-black ${f.color.replace('bg-','text-')} mb-4 uppercase tracking-[0.2em]">${f.title}</p>
                <div class="space-y-4 border-l-2 pl-6">${project.tasks.filter(t => t.phaseId === f.id).map(t => {
                        const perc = t.status === STATUS.FET ? "100%" : (t.status === STATUS.EXECUCIO ? "50%" : "5%");
                        return `<div class="space-y-1"><div class="flex justify-between items-end"><span class="text-[10px] font-bold text-slate-600 uppercase">${t.title}</span><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${formatDate(t.startDate)} a ${formatDate(t.endDate)}</span></div>
                        <div class="h-3 bg-slate-50 rounded-full overflow-hidden relative"><div class="h-full ${f.color} transition-all duration-700 shadow-sm" style="width: ${perc}"></div></div></div>`;
                }).join('')}</div></div>`).join('')}</div>`;
      } else if (state.activeTab === 'dashboard') {
        main.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-4 gap-8">${STRUCTURE.map(f => {
            const tks = project.tasks.filter(t => t.phaseId === f.id);
            const p = Math.round((tks.filter(t=>t.status===STATUS.FET).length/tks.length)*100)||0;
            return `<div class="bg-white p-10 rounded-[2.5rem] shadow-xl text-center border flex flex-col items-center"><div class="text-5xl font-black mb-4 text-slate-900">${p}%</div><p class="text-[10px] font-black text-slate-400 uppercase pt-4 border-t w-full tracking-widest">${f.id}</p></div>`;
        }).join('')}</div>`;
      }
    }
    init();
  </script>
</body>
</html>
